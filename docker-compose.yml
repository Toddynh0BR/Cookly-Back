version: "3.9"

services:

  backend:
    build: ./BackEnd
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - searxng

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml

    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=MinhaBusca